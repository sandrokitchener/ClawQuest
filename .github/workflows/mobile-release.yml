name: Mobile Release

on:
  push:
    tags:
      - 'mobile-v*'

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad
        with:
          bun-version: 1.3.10

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android packages
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0" "platform-tools" "ndk;27.2.12479018"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Initialize Android project
        working-directory: desktop
        run: bunx tauri android init --ci

      - name: Build Android release APK
        working-directory: desktop
        run: bunx tauri android build --apk --target aarch64 --ci

      - name: List APK outputs
        run: find desktop -path "*/outputs/apk/*" -type f -name "*.apk" -print

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Claw Quest Mobile ${{ github.ref_name }}
          body: |
            Android release builds for Claw Quest.

            This workflow currently publishes the arm64 release APK generated by Tauri and Gradle.
            The attached artifact is intended for signing or internal sideload distribution.
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            desktop/**/outputs/apk/**/*.apk
