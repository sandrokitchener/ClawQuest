name: Mobile Release

on:
  push:
    tags:
      - 'mobile-v*'

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad
        with:
          bun-version: 1.3.10

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android packages
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0" "platform-tools" "ndk;27.2.12479018"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Initialize Android project
        working-directory: desktop
        run: bunx tauri android init --ci

      - name: Configure Android release project
        run: node scripts/configure-android-release.mjs

      - name: Setup Android signing
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEYSTORE_BASE64"
          cd desktop/src-tauri/gen/android
          echo "keyAlias=$ANDROID_KEY_ALIAS" > keystore.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> keystore.properties
          echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" >> keystore.properties
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build signed Android release artifacts
        working-directory: desktop
        run: bunx tauri android build --aab --apk --ci

      - name: List Android outputs
        run: |
          find desktop -path "*/outputs/apk/*" -type f -name "*.apk" -print
          find desktop -path "*/outputs/bundle/*" -type f -name "*.aab" -print

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Claw Quest Mobile ${{ github.ref_name }}
          body: |
            Signed Android release artifacts for Claw Quest.

            - `.aab` is the recommended upload artifact for Google Play.
            - `.apk` is included for direct install and release smoke testing.
            - The first Google Play upload still needs to be completed manually in Play Console.
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            desktop/**/outputs/bundle/**/*.aab
            desktop/**/outputs/apk/**/*.apk
