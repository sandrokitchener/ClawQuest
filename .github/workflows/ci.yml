name: Desktop CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  desktop-build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad
        with:
          bun-version: 1.3.10

      - uses: dtolnay/rust-toolchain@stable

      - name: Install
        run: bun install --frozen-lockfile

      - name: Desktop UI build
        run: bun run desktop:ui:build

      - name: Desktop Rust check
        run: cargo check --manifest-path desktop/src-tauri/Cargo.toml

  android-smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad
        with:
          bun-version: 1.3.10

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android packages
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0" "platform-tools" "ndk;27.2.12479018"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Initialize Android project
        working-directory: desktop
        run: bunx tauri android init --ci

      - name: Configure Android release project
        run: node scripts/configure-android-release.mjs

      - name: Build Android smoke APK
        working-directory: desktop
        run: bunx tauri android build --apk --target aarch64 --ci
