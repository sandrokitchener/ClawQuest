name: Desktop CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  desktop-build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad
        with:
          bun-version: 1.3.10

      - uses: dtolnay/rust-toolchain@stable

      - name: Install
        run: bun install --frozen-lockfile

      - name: Desktop UI build
        run: bun run desktop:ui:build

      - name: Desktop Rust check
        run: cargo check --manifest-path desktop/src-tauri/Cargo.toml
